                    <div className="space-y-4">
                        <p className="text-lg">Dans un repère orthonormé <span className="font-mono bg-gray-100 px-1 rounded">(O, i, j)</span>, le <strong>demi-cercle trigonométrique</strong> ζ est le demi-cercle de centre O, de rayon R = 1, situé dans le demi-plan supérieur (y ≥ 0).</p>

                            <ul className="list-disc ml-6 mt-3 space-y-1">

                        solution: (

                                <p><strong>Étape 1 :</strong> L'angle π/3 (60°) est dans le premier quadrant. Le point M est à droite. L'angle 5π/6 (150°) est dans le deuxième quadrant, N est à gauche.</p>
                                <p><strong>Étape 2 :</strong> Puisque N(5π/6) est situé dans la partie gauche, son ordonnée (sinus) est positive, mais son abscisse (cosinus) est strictement négative.</p>

                        solution: (

                                <p><strong>Méthode :</strong> On place la valeur -1/3 sur l'axe des abscisses (axe horizontal). On trace la droite verticale d'équation x = -1/3.</p>
                                <p>Cette droite coupe le demi-cercle en un unique point M (car y ≥ 0).</p>
                                <p className="text-green-700"><strong>Conclusion :</strong> Le point M étant sur le demi-cercle supérieur, son ordonnée est forcément positive. Donc <strong>sin(α) &gt; 0</strong>.</p>

                                    <li>L'angle <strong>π/2 (90°)</strong> correspond au point J, le sommet. Coordonnées : <strong>J(0, 1)</strong>. On en déduit cos(π/2)=0 et sin(π/2)=1.</li>
                                    <li>L'angle <strong>π (180°)</strong> correspond au point K, à l'extrémité gauche. Coordonnées : <strong>K(-1, 0)</strong>. On en déduit cos(π)=-1 et sin(π)=0.</li>
                                </ul>

            {

                course: (
                    <div className="space-y-4">

                                    </tr>
                                    <tr>

                                        <td className="p-3 border font-medium text-green-700">√3/2</td>
                                        <td className="p-3 border font-medium text-green-700">√2/2</td>
                                        <td className="p-3 border font-medium text-green-700">1/2</td>
                                        <td className="p-3 border">0</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded-lg shadow-sm mt-4">
                            <h4 className="font-bold text-yellow-800 mb-2 flex items-center"><Icons.Star /> Astuce de mémorisation (Règle de la main)</h4>
                            <p className="text-sm">Pour retenir les valeurs du sinus, numérotez les doigts de votre main ouverte de 0 à 4 (Pouce=0°, Index=30°, Majeur=45°, Annulaire=60°, Auriculaire=90°).</p>
                            <p className="text-sm mt-1">La valeur du sinus est toujours : <strong>√(Numéro du doigt) / 2</strong>.</p>
                            <ul className="list-disc ml-6 mt-2 text-sm font-mono text-yellow-900">
                                <li>Pour 30° (doigt 1) : √1 / 2 = 1/2</li>
                                <li>Pour 45° (doigt 2) : √2 / 2</li>
                                <li>Pour 60° (doigt 3) : √3 / 2</li>
                            </ul>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                            <div className="bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-lg shadow-sm">
                                <h4 className="font-bold text-indigo-800 mb-2">Angles Supplémentaires (π - α)</h4>
                                <p className="text-sm mb-3">La somme fait 180° (π). Symétriques par rapport à l'axe vertical.</p>
                                <div className="bg-white p-3 rounded border border-indigo-100">
                                    <ul className="list-none space-y-2 font-mono text-indigo-900 font-semibold">
                                        <li>sin(π - α) = sin(α)</li>
                                        <li>cos(π - α) = -cos(α)</li>
                                    </ul>
                                </div>
                            </div>
                            <div className="bg-teal-50 border-l-4 border-teal-500 p-5 rounded-lg shadow-sm">
                                <h4 className="font-bold text-teal-800 mb-2">Angles Complémentaires (π/2 - α)</h4>
                                <p className="text-sm mb-3">La somme fait 90° (π/2). Symétriques par rapport à la bissectrice.</p>
                                <div className="bg-white p-3 rounded border border-teal-100">
                                    <ul className="list-none space-y-2 font-mono text-teal-900 font-semibold">

                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg shadow-sm mt-4">

                            <p className="font-mono mt-2 text-sm bg-white p-2 rounded inline-block text-blue-900 border border-blue-200">
                                150° = 180° - 30° ⇒ sin(150°) = sin(30°) = 1/2

                    {

                    {
                        question: "Parmi les propositions suivantes, laquelle est vraie pour tout angle α ?",

                        explanation: "Le cosinus du complémentaire est égal au sinus de l'angle. C'est la relation fondamentale des triangles rectangles (le cos de l'un est le sin de l'autre)."
                    },
                    {
                        question: "Que vaut sin(3π/4) ?",

                        correct: 1,
                        explanation: "3π/4 est le supplémentaire de π/4 (car π - π/4 = 3π/4). Ils ont le même sinus : sin(π/4) = √2/2, donc sin(3π/4) = √2/2."
                    },
                    {
                        question: "Que vaut la somme : cos(10°) + cos(170°) ?",
                        options: ["1", "-1", "0", "On ne peut pas calculer sans machine"],
                        correct: 2,
                        explanation: "170° et 10° sont supplémentaires (170 + 10 = 180). Or, cos(180° - x) = -cos(x). Donc cos(170°) = -cos(10°). La somme donne 0."
                    },
                    {
                        question: "Sachant que sin(x) = cos(20°), que peut valoir x (si x est un angle aigu) ?",
                        options: ["20°", "70°", "160°", "90°"],
                        correct: 1,
                        explanation: "Le sinus d'un angle est égal au cosinus de son complémentaire (somme = 90°). Donc sin(70°) = cos(90° - 70°) = cos(20°)."
                    }
                ],
                exercises: [
                    {
                        title: "Calcul exact en utilisant les symétries",
                        statement: "Calculer les valeurs exactes de : A = cos(2π/3) et B = sin(3π/4).",
                        solution: (
                            <div className="space-y-3">
                                <div>
                                    <p className="font-semibold text-blue-700">Calcul de A :</p>
                                    <p>On remarque que 2π/3 = π - π/3.</p>
                                    <p>D'après la propriété des angles supplémentaires : cos(π - α) = -cos(α).</p>
                                    <p>Donc cos(2π/3) = -cos(π/3) = -1/2.</p>
                                </div>
                                <div>
                                    <p className="font-semibold text-blue-700">Calcul de B :</p>
                                    <p>On remarque que 3π/4 = π - π/4.</p>
                                    <p>Propriété : sin(π - α) = sin(α).</p>
                                    <p>Donc sin(3π/4) = sin(π/4) = √2/2.</p>
                                </div>
                            </div>
                        )
                    },
                    {

                        statement: "Simplifier l'expression E = sin(π - x) + cos(π/2 - x) - 2sin(x).",
                        solution: (
                            <div className="space-y-2">
                                <p>Appliquons les propriétés du cours terme par terme :</p>
                                <ul className="list-disc ml-6 font-mono text-sm bg-gray-50 p-2 rounded inline-block">
                                    <li>sin(π - x) = sin(x)</li>
                                    <li>cos(π/2 - x) = sin(x)</li>
                                </ul>
                                <p>En remplaçant dans E : E = sin(x) + sin(x) - 2sin(x)</p>
                                <p>E = 2sin(x) - 2sin(x) = 0.</p>
                                <p className="text-green-700 font-bold">Conclusion : E = 0.</p>
                            </div>
                        )
                    },
                    {

                                <p>On remarque que 15° + 75° = 90°.</p>
                                <p>D'après le cours : sin(75°) = cos(90° - 75°) = cos(15°).</p>
                                <p>On remplace dans l'expression de S : S = sin²(15°) + cos²(15°)</p>
                                <p>On reconnait la relation fondamentale : cos²(x) + sin²(x) = 1 pour tout x.</p>
                                <p className="text-green-700 font-bold">Conclusion : S = 1.</p>

                                <p>On remarque que :</p>

                                    <li>5π/8 = π - 3π/8  ⇒  cos(5π/8) = -cos(3π/8)</li>

                        explanation: "D'après les relations métriques de la page 86, AH² = HB × HC. Donc AH² = 2 × 8 = 16. La hauteur AH vaut donc la racine de 16, soit 4."

                ],
                exercises: [
                    {
                        title: "Théorème d'El-Kashi (Côté manquant)",
                        statement: "Soit un triangle ABC tel que AB = 4, AC = 5 et l'angle Â = 60°. Calculer la valeur exacte de la longueur BC.",
                        solution: (

                                <p>On applique le théorème d'El-Kashi :</p>
                                <p className="font-mono bg-indigo-50 p-2 rounded">a² = b² + c² - 2bc × cos(Â)</p>
                                <p>BC² = AC² + AB² - 2 × AC × AB × cos(60°)</p>
                                <p>BC² = 5² + 4² - 2 × 5 × 4 × (1/2)   <span className="text-gray-500 text-sm">(Rappel: cos 60° = 1/2)</span></p>
                                <p>BC² = 25 + 16 - 40 × 0.5</p>

                    {
                        title: "Aire et Loi des Sinus",

                        solution: (
                            <div className="space-y-3">
                                <div>
                                    <p className="font-semibold text-blue-700">1. Calcul de l'angle Ĉ :</p>
                                    <p>La somme des angles d'un triangle fait 180°. Ĉ = 180° - (45° + 60°) = 180° - 105° = 75°.</p>
                                </div>
                                <div>
                                    <p className="font-semibold text-blue-700">2. Longueur a (BC) :</p>
                                    <p>Loi des sinus : a / sin(Â) = b / sin(B̂).</p>
                                    <p>a / sin(45°) = 6 / sin(60°)</p>
                                    <p>a / (√2/2) = 6 / (√3/2)</p>
                                    <p>a = (√2/2) × [ 12 / √3 ] = (6√2) / √3 = 2√6.</p>
                                </div>
                                <div>
                                    <p className="font-semibold text-blue-700">3. Aire du triangle :</p>
                                    <p>S = (1/2) × a × b × sin(Ĉ)  OU  S = (1/2) × c × b × sin(Â).</p>
                                    <p>En utilisant a et b : S = (1/2) × (2√6) × 6 × sin(75°).</p>
                                    <p className="text-gray-600 text-sm">*(Note : on garde sin(75°) ou on utilise sa valeur exacte (√6+√2)/4 vue en exercice des pages précédentes).*</p>
                                    <p className="text-green-700 font-bold">S = 6√6 × sin(75°).</p>
                                </div>
                            </div>
                        )
                    },
                    {
                        title: "Relations Métriques (Page 86)",
                        statement: "Soit ABC un triangle rectangle en A. [AH] est la hauteur issue de A. On donne HB = 2 cm et HC = 8 cm. Calculer les longueurs AH, AB et AC.",
                        solution: (
                            <div className="space-y-3">
                                <p className="font-semibold text-amber-600 bg-amber-50 p-2 rounded flex items-center"><Icons.Star /> Astuce : On connaît les projections de l'hypoténuse (HB et HC), on applique directement les 3 relations métriques des carrés.</p>
                                <div>
                                    <p className="font-bold text-rose-800">1. Calcul de la hauteur AH :</p>
                                    <p>On sait que AH² = HB × HC.</p>

                                <div>

                                    <p>On calcule l'hypoténuse BC = BH + HC = 2 + 8 = 10 cm.</p>
                                    <p>AB² = 2 × 10 = 20  ⇒  <strong className="text-green-700">AB = √20 = 2√5 cm</strong>.</p>
                                </div>
                                <div>
                                    <p className="font-bold text-rose-800">3. Calcul du côté AC :</p>
                                    <p>On sait que AC² = CH × BC.</p>
                                    <p>AC² = 8 × 10 = 80  ⇒  <strong className="text-green-700">AC = √80 = 4√5 cm</strong>.</p>
                                </div>
                                <p className="text-sm text-gray-500 italic mt-2">Vérification par Pythagore : AB² + AC² = 20 + 80 = 100. Et BC² = 10² = 100. C'est parfait !</p>
                            </div>
                        )

        ];

        // ==========================================
        // 🔬 LABORATOIRES INTERACTIFS (SVGs)
        // ==========================================

        // Nouveau labo spécifique pour le triangle (El-Kashi / Aire)
        const TriangleLab = () => {
            const [b, setB] = useState(6);
            const [c, setC] = useState(5);
            const [angleA, setAngleA] = useState(60);

            // Calculs trigonométriques du triangle
            const radA = angleA * Math.PI / 180;
            const a2 = b*b + c*c - 2*b*c*Math.cos(radA);
            const a = Math.sqrt(a2);
            const area = 0.5 * b * c * Math.sin(radA);

            // Dessin SVG (mise à l'échelle)
            const scale = 15;
            const ptA = { x: 0, y: 0 };
            const ptC = { x: b * scale, y: 0 };
            const ptB = { x: c * scale * Math.cos(radA), y: -c * scale * Math.sin(radA) };

            const formatVal = (val) => val.toFixed(1);

            return (
                <div className="flex flex-col items-center max-w-2xl mx-auto bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                    
                    <div className="w-full mb-6 bg-indigo-50 p-4 rounded-xl border border-indigo-100 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label className="flex justify-between text-sm font-bold text-slate-700 mb-1">
                                <span>Côté b (AC)</span>
                                <span className="text-indigo-700">{b}</span>
                            </label>
                            <input type="range" min="2" max="10" step="0.5" value={b} onChange={(e) => setB(parseFloat(e.target.value))} className="w-full accent-indigo-600" />
                        </div>
                        <div>
                            <label className="flex justify-between text-sm font-bold text-slate-700 mb-1">
                                <span>Côté c (AB)</span>
                                <span className="text-indigo-700">{c}</span>
                            </label>
                            <input type="range" min="2" max="10" step="0.5" value={c} onChange={(e) => setC(parseFloat(e.target.value))} className="w-full accent-indigo-600" />
                        </div>
                        <div>
                            <label className="flex justify-between text-sm font-bold text-slate-700 mb-1">
                                <span>Angle Â</span>
                                <span className="text-indigo-700">{angleA}°</span>
                            </label>
                            <input type="range" min="10" max="170" value={angleA} onChange={(e) => setAngleA(parseInt(e.target.value))} className="w-full accent-indigo-600" />
                        </div>
                    </div>

                    <div className="relative w-full max-w-[400px] aspect-video bg-slate-50 rounded-lg border border-slate-200 overflow-hidden flex items-center justify-center touch-none">
                        <svg viewBox="-50 -150 250 180" className="w-full h-full drop-shadow-sm">
                            {/* Triangle */}
                            <polygon points={`${ptA.x},${ptA.y} ${ptB.x},${ptB.y} ${ptC.x},${ptC.y}`} fill="#e0e7ff" stroke="#4f46e5" strokeWidth="2" strokeLinejoin="round" />
                            {/* Angle A Arc */}
                            <path d={`M 20 0 A 20 20 0 0 0 ${20 * Math.cos(radA)} ${-20 * Math.sin(radA)}`} fill="none" stroke="#ef4444" strokeWidth="2" />
                            {/* Labels Points */}
                            <text x="-15" y="15" fontSize="12" fontWeight="bold" fill="#334155">A</text>
                            <text x={ptB.x - 5} y={ptB.y - 10} fontSize="12" fontWeight="bold" fill="#334155">B</text>
                            <text x={ptC.x + 5} y={ptC.y + 15} fontSize="12" fontWeight="bold" fill="#334155">C</text>
                            {/* Labels Côtés */}
                            <text x={ptC.x / 2} y="15" fontSize="12" fill="#4f46e5" fontWeight="bold">b = {b}</text>
                            <text x={(ptA.x + ptB.x)/2 - 25} y={(ptA.y + ptB.y)/2 - 10} fontSize="12" fill="#4f46e5" fontWeight="bold">c = {c}</text>
                            <text x={(ptB.x + ptC.x)/2 + 10} y={(ptB.y + ptC.y)/2 - 10} fontSize="12" fill="#ef4444" fontWeight="bold">a = {formatVal(a)}</text>
                        </svg>
                    </div>

                    <div className="mt-6 w-full grid grid-cols-1 sm:grid-cols-2 gap-3 text-center">
                        <div className="bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                            <span className="block text-xs font-bold text-indigo-800 uppercase mb-2">Théorème d'El-Kashi (côté a)</span>
                            <span className="block text-sm font-mono text-slate-700 mb-1">a² = {b}² + {c}² - 2({b})({c})cos({angleA}°)</span>
                            <span className="block text-lg font-bold text-indigo-700">a ≈ {formatVal(a)}</span>
                        </div>
                        <div className="bg-teal-50 p-4 rounded-lg border border-teal-200">
                            <span className="block text-xs font-bold text-teal-800 uppercase mb-2">Aire du Triangle (S)</span>
                            <span className="block text-sm font-mono text-slate-700 mb-1">S = ½ × {b} × {c} × sin({angleA}°)</span>
                            <span className="block text-lg font-bold text-teal-700">S ≈ {formatVal(area)} u.a.</span>
                        </div>
                    </div>
                </div>
            );
        };

        const TrigonometryLab = ({ type }) => {
            const [angleDeg, setAngleDeg] = useState(60);
            const [showSupp, setShowSupp] = useState(false);
            const [showComp, setShowComp] = useState(false);

            const rad = angleDeg * (Math.PI / 180);
            const R = 100; 
            const cx = R * Math.cos(rad);
            const cy = -R * Math.sin(rad);

            const formatVal = (val) => val.toFixed(2);
            const cosVal = Math.cos(rad);
            const sinVal = Math.sin(rad);

            const primaryColor = "#2563eb"; 
            const axisColor = "#94a3b8"; 
            const cosColor = "#dc2626"; 
            const sinColor = "#16a34a"; 

            return (
                <div className="flex flex-col items-center max-w-2xl mx-auto bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                    
                    <div className="w-full mb-6 bg-slate-50 p-4 rounded-xl">
                        <label className="flex justify-between font-bold text-slate-700 mb-2">
                            <span>Angle α</span>
                            <span className="text-blue-600 bg-blue-100 px-2 py-1 rounded text-sm">{angleDeg}° ({(angleDeg/180).toFixed(2)}π rad)</span>
                        </label>
                        <input 
                            type="range" 
                            min="0" max="180" 
                            value={angleDeg} 
                            onChange={(e) => setAngleDeg(parseInt(e.target.value))}
                            className="w-full h-3 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                        />
                    </div>

                    {type === 'circle-sym' && (
                        <div className="flex gap-4 mb-4 text-sm font-semibold">
                            <label className="flex items-center cursor-pointer p-2 bg-indigo-50 text-indigo-700 rounded border border-indigo-200">
                                <input type="checkbox" className="mr-2 accent-indigo-600 w-4 h-4" checked={showSupp} onChange={e => setShowSupp(e.target.checked)} />

                            </label>
                            <label className="flex items-center cursor-pointer p-2 bg-teal-50 text-teal-700 rounded border border-teal-200">
                                <input type="checkbox" className="mr-2 accent-teal-600 w-4 h-4" checked={showComp} onChange={e => setShowComp(e.target.checked)} />
                                Montrer (π/2 - α)
                            </label>
                        </div>
                    )}

                    <div className="relative w-full max-w-[350px] aspect-[4/3] bg-slate-50 rounded-lg border border-slate-200 overflow-hidden touch-none">
                        <svg viewBox="-140 -140 280 180" className="w-full h-full drop-shadow-sm">
                            <g stroke="#e2e8f0" strokeWidth="1" strokeDasharray="5,5">
                                <line x1="-100" y1="-100" x2="-100" y2="20" />
                                <line x1="-50" y1="-100" x2="-50" y2="20" />
                                <line x1="50" y1="-100" x2="50" y2="20" />
                                <line x1="100" y1="-100" x2="100" y2="20" />
                                <line x1="-120" y1="-50" x2="120" y2="-50" />
                                <line x1="-120" y1="-100" x2="120" y2="-100" />
                            </g>

                            <g stroke={axisColor} strokeWidth="1.5">
                                <line x1="-130" y1="0" x2="130" y2="0" markerEnd="url(#arrowX)" />
                                <line x1="0" y1="20" x2="0" y2="-130" markerEnd="url(#arrowY)" />
                            </g>
                            <text x="120" y="15" fontSize="12" fill={axisColor} fontFamily="monospace">x (cos)</text>
                            <text x="-35" y="-120" fontSize="12" fill={axisColor} fontFamily="monospace">y (sin)</text>
                            <text x="-12" y="14" fontSize="12" fill={axisColor} fontWeight="bold">O</text>
                            <text x="102" y="14" fontSize="10" fill={axisColor}>1</text>
                            <text x="-10" y="-102" fontSize="10" fill={axisColor}>1</text>
                            <text x="-110" y="14" fontSize="10" fill={axisColor}>-1</text>

                            <defs>
                                <marker id="arrowX" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                    <path d="M 0 0 L 10 5 L 0 10 z" fill={axisColor} />
                                </marker>
                                <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                    <path d="M 0 0 L 10 5 L 0 10 z" fill={axisColor} />
                                </marker>
                            </defs>

                            <path d="M -100 0 A 100 100 0 0 1 100 0" fill="none" stroke="#64748b" strokeWidth="2" />

                            {type === 'circle-tan' && (
                                <>
                                    <line x1="100" y1="20" x2="100" y2="-130" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,2" />
                                    <text x="105" y="-120" fontSize="10" fill="#d97706" fontWeight="bold">x=1 (tan)</text>
                                    
                                    <line x1="-130" y1="-100" x2="130" y2="-100" stroke="#10b981" strokeWidth="1.5" strokeDasharray="4,2" />
                                    <text x="-125" y="-105" fontSize="10" fill="#059669" fontWeight="bold">y=1 (cot)</text>

                                    {angleDeg !== 90 && (
                                        <line x1="0" y1="0" x2={angleDeg < 90 ? 100 : -100} y2={angleDeg < 90 ? -100*Math.tan(rad) : 100*Math.tan(rad)} stroke="#cbd5e1" strokeWidth="1" strokeDasharray="2,2"/>
                                    )}

                                    {angleDeg !== 90 && (
                                        <>
                                            <circle cx="100" cy={-100 * Math.tan(rad)} r="4" fill="#d97706" />
                                            <text x="108" y={-100 * Math.tan(rad) + 4} fontSize="10" fill="#d97706" fontWeight="bold">T</text>
                                        </>
                                    )}
                                    
                                    {angleDeg !== 0 && angleDeg !== 180 && (
                                        <>
                                            <circle cx={100 / Math.tan(rad)} cy="-100" r="4" fill="#059669" />
                                            <text x={100 / Math.tan(rad) - 4} y="-110" fontSize="10" fill="#059669" fontWeight="bold">K</text>
                                        </>
                                    )}
                                </>
                            )}

                            {type === 'circle-sym' && showComp && (
                                <g opacity="0.6">
                                    <path d={`M 0 0 L ${R * Math.cos(Math.PI/2 - rad)} ${-R * Math.sin(Math.PI/2 - rad)}`} stroke="#0d9488" strokeWidth="2" strokeDasharray="4,4" />
                                    <circle cx={R * Math.cos(Math.PI/2 - rad)} cy={-R * Math.sin(Math.PI/2 - rad)} r="4" fill="#0d9488" />
                                    <text x={R * Math.cos(Math.PI/2 - rad) + 5} y={-R * Math.sin(Math.PI/2 - rad) - 5} fontSize="10" fill="#0d9488">M'</text>
                                    <line x1="0" y1="0" x2="100" y2="-100" stroke="#0d9488" strokeWidth="1" opacity="0.4" />
                                </g>
                            )}

                            {type === 'circle-sym' && showSupp && (
                                <g opacity="0.6">
                                    <path d={`M 0 0 L ${R * Math.cos(Math.PI - rad)} ${-R * Math.sin(Math.PI - rad)}`} stroke="#4f46e5" strokeWidth="2" strokeDasharray="4,4" />
                                    <circle cx={R * Math.cos(Math.PI - rad)} cy={-R * Math.sin(Math.PI - rad)} r="4" fill="#4f46e5" />
                                    <text x={R * Math.cos(Math.PI - rad) - 15} y={-R * Math.sin(Math.PI - rad) - 5} fontSize="10" fill="#4f46e5">M''</text>
                                </g>
                            )}

                            <path d={`M 20 0 A 20 20 0 0 0 ${20 * Math.cos(rad)} ${-20 * Math.sin(rad)}`} fill="none" stroke={primaryColor} strokeWidth="2" />
                            
                            <line x1="0" y1="0" x2={cx} y2={cy} stroke={primaryColor} strokeWidth="2.5" />
                            <circle cx={cx} cy={cy} r="5" fill={primaryColor} />
                            <text x={cx + (cx >= 0 ? 8 : -18)} y={cy - 8} fontSize="12" fontWeight="bold" fill={primaryColor}>M</text>

                            {type !== 'circle-tan' && (
                                <>
                                    <line x1={cx} y1={cy} x2={cx} y2="0" stroke={cosColor} strokeWidth="1.5" strokeDasharray="3,3" />
                                    <line x1="0" y1="0" x2={cx} y2="0" stroke={cosColor} strokeWidth="3" />
                                    <line x1={cx} y1={cy} x2="0" y2={cy} stroke={sinColor} strokeWidth="1.5" strokeDasharray="3,3" />
                                    <line x1="0" y1="0" x2="0" y2={cy} stroke={sinColor} strokeWidth="3" />
                                </>
                            )}

                            {type === 'circle-pythagore' && (
                                <path d={`M 0 0 L ${cx} 0 L ${cx} ${cy} Z`} fill="#fef08a" opacity="0.4" stroke="#eab308" strokeWidth="1" />
                            )}
                        </svg>
                    </div>

                    <div className="mt-6 w-full grid grid-cols-2 gap-3 text-center">
                        <div className="bg-red-50 p-3 rounded-lg border border-red-100">
                            <span className="block text-xs font-bold text-red-600 uppercase mb-1">Cosinus (x)</span>
                            <span className="block text-lg font-mono text-slate-800">{formatVal(cosVal)}</span>
                        </div>
                        <div className="bg-green-50 p-3 rounded-lg border border-green-100">
                            <span className="block text-xs font-bold text-green-600 uppercase mb-1">Sinus (y)</span>
                            <span className="block text-lg font-mono text-slate-800">{formatVal(sinVal)}</span>
                        </div>
                        
                        {type === 'circle-tan' && (
                            <>
                                <div className="bg-amber-50 p-3 rounded-lg border border-amber-100">
                                    <span className="block text-xs font-bold text-amber-600 uppercase mb-1">Tangente</span>
                                    <span className="block text-lg font-mono text-slate-800">
                                        {angleDeg === 90 ? "Non définie" : formatVal(Math.tan(rad))}
                                    </span>
                                </div>
                                <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-100">
                                    <span className="block text-xs font-bold text-emerald-600 uppercase mb-1">Cotangente</span>
                                    <span className="block text-lg font-mono text-slate-800">
                                        {(angleDeg === 0 || angleDeg === 180) ? "Non définie" : formatVal(1/Math.tan(rad))}
                                    </span>
                                </div>
                            </>
                        )}

                        {type === 'circle-pythagore' && (
                            <div className="col-span-2 bg-blue-50 p-3 rounded-lg border border-blue-200 mt-2">
                                <span className="block text-sm font-bold text-blue-800 mb-1">Vérification de l'identité :</span>
                                <span className="block text-base font-mono">
                                    ({formatVal(cosVal)})² + ({formatVal(sinVal)})² = 
                                    <span className="font-bold text-blue-600 ml-1">
                                        {formatVal(cosVal * cosVal)} + {formatVal(sinVal * sinVal)} = {Math.round(cosVal*cosVal + sinVal*sinVal)}
                                    </span>
                                </span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 📝 COMPOSANT QCM (Interactif avec feedback)
        // ==========================================
        const Quiz = ({ questions }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showResult, setShowResult] = useState(false);

            useEffect(() => {
                setCurrentQ(0);
                setSelected(null);
                setShowResult(false);
            }, [questions]);

            const handleSelect = (idx) => {
                if(showResult) return;
                setSelected(idx);
                setShowResult(true);
            };

            const nextQ = () => {
                setCurrentQ(prev => prev + 1);
                setSelected(null);
                setShowResult(false);
            };

            const q = questions[currentQ];

            return (
                <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-center mb-6">
                        <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">Question {currentQ + 1} / {questions.length}</span>
                        <div className="flex gap-1 flex-wrap">
                            {questions.map((_, i) => (
                                <div key={i} className={`h-2 w-4 sm:w-6 rounded-full mb-1 ${i === currentQ ? 'bg-blue-600' : i < currentQ ? 'bg-blue-200' : 'bg-slate-200'}`}></div>
                            ))}
                        </div>
                    </div>
                    
                    <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-6 leading-tight">{q.question}</h3>
                    
                    <div className="space-y-3">
                        {q.options.map((opt, idx) => {
                            const isSelected = selected === idx;
                            const isCorrect = idx === q.correct;
                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-medium ";
                            
                            if (!showResult) {
                                btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 active:bg-blue-100 text-slate-700";
                            } else {
                                if (isCorrect) btnClass += "border-green-500 bg-green-50 text-green-800";
                                else if (isSelected) btnClass += "border-red-500 bg-red-50 text-red-800";
                                else btnClass += "border-slate-200 opacity-50";
                            }

                            return (
                                <button key={idx} onClick={() => handleSelect(idx)} disabled={showResult} className={btnClass}>
                                    <div className="flex items-center">
                                        <div className={`w-6 h-6 shrink-0 rounded-full border-2 mr-3 flex items-center justify-center
                                            ${showResult && isCorrect ? 'border-green-500 bg-green-500 text-white' : 
                                              showResult && isSelected ? 'border-red-500 bg-red-500 text-white' : 'border-slate-300'}`}>
                                            {showResult && isCorrect && <Icons.CheckCircle />}
                                        </div>
                                        <span>{opt}</span>
                                    </div>
                                </button>
                            );
                        })}
                    </div>

                    {showResult && (
                        <div className={`mt-6 p-4 rounded-xl animate-fadeIn ${selected === q.correct ? 'bg-green-100 text-green-900 border border-green-200' : 'bg-amber-50 text-amber-900 border border-amber-200'}`}>
                            <div className="flex items-start">
                                <div className="mt-0.5 mr-3 shrink-0">
                                    {selected === q.correct ? <Icons.CheckCircle /> : <Icons.AlertCircle />}
                                </div>
                                <div>
                                    <h4 className="font-bold mb-1">{selected === q.correct ? 'Excellente réponse !' : 'Oups, regardons de plus près.'}</h4>
                                    <p className="text-sm leading-relaxed">{q.explanation}</p>
                                </div>
                            </div>
                            
                            {currentQ < questions.length - 1 ? (
                                <button onClick={nextQ} className="mt-4 w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-4 rounded-xl transition-colors flex justify-center items-center">
                                    Question suivante <Icons.ChevronRight />
                                </button>
                            ) : (
                                <div className="mt-4 p-3 bg-white bg-opacity-50 rounded-lg text-center font-bold text-slate-700">
                                    Fin du QCM pour ce module ! 🎉
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // ✏️ COMPOSANT EXERCICES (Pas à pas)
        // ==========================================
        const ExerciseViewer = ({ exercises }) => {
            const [openIdx, setOpenIdx] = useState(null);

            return (
                <div className="space-y-4">
                    {exercises.map((ex, idx) => (
                        <div key={idx} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 bg-slate-50">
                                <div className="flex items-center text-blue-800 font-bold mb-2">
                                    <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mr-2 uppercase tracking-wide">Exercice {idx + 1}</span>
                                    <h3 className="text-lg">{ex.title}</h3>
                                </div>
                                <p className="text-slate-700 font-medium leading-relaxed">{ex.statement}</p>
                            </div>
                            
                            <div className="p-2">
                                <button 
                                    onClick={() => setOpenIdx(openIdx === idx ? null : idx)}
                                    className="w-full text-left px-4 py-3 rounded-xl font-bold flex justify-between items-center text-slate-600 hover:bg-slate-100 transition-colors"
                                >
                                    <span className="flex items-center"><Icons.Info /> <span className="ml-2">Correction et Astuce du Manuel</span></span>
                                    <span className="text-2xl leading-none">{openIdx === idx ? '−' : '+'}</span>
                                </button>
                                
                                {openIdx === idx && (
                                    <div className="px-4 pb-4 pt-2 animate-fadeIn">
                                        <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100 text-slate-800">
                                            {ex.solution}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // ==========================================
        // 🌟 APPLICATION PRINCIPALE
        // ==========================================
        const App = () => {
            const [activeModuleId, setActiveModuleId] = useState(modulesData[0].id);
            const [activeTab, setActiveTab] = useState('labo');

            const activeModule = modulesData.find(m => m.id === activeModuleId);

            const tabs = [
                { id: 'cours', label: 'Résumé de Cours', icon: Icons.BookOpen },
                { id: 'labo', label: 'Laboratoire', icon: Icons.Beaker },
                { id: 'qcm', label: 'QCM Rapide', icon: Icons.CheckSquare },
                { id: 'exercices', label: 'Exercices', icon: Icons.Edit3 },
            ];

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Header Pédagogique */}
                    <header className="bg-slate-900 text-white pt-6 pb-4 px-4 shadow-md sticky top-0 z-20">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight mb-1">
                                <span className="text-blue-400">Maths</span> 2ème Sciences
                            </h1>
                            <p className="text-slate-400 text-sm sm:text-base font-medium flex items-center">
                                Chapitre 5 : Trigonométrie et mesure de grandeurs
                            </p>
                        </div>
                    </header>

                    {/* Sélecteur de Notions (FIX AFFICHAGE MULTI-LIGNES SUR ECRAN ETROIT) */}
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-[76px] z-10">
                        <div className="max-w-4xl mx-auto px-2 sm:px-4 py-3 flex flex-wrap justify-center gap-2">
                            {modulesData.map(mod => (
                                <button
                                    key={mod.id}
                                    onClick={() => { setActiveModuleId(mod.id); setActiveTab('labo'); }}
                                    className={`flex items-center px-3 py-2 rounded-full font-bold text-sm sm:text-base transition-all
                                        ${activeModuleId === mod.id 
                                            ? 'bg-blue-600 text-white shadow-md ring-2 ring-blue-300 ring-offset-1' 
                                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                >
                                    <span className="mr-2">{mod.icon}</span> {mod.title}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Contenu Principal */}
                    <main className="flex-1 max-w-4xl w-full mx-auto p-4 sm:p-6 mb-12">
                        
                        {/* Navigation interne (Onglets) */}
                        <div className="flex bg-slate-200 p-1 rounded-2xl mb-6 overflow-hidden">
                            {tabs.map(tab => {
                                const Icon = tab.icon;
                                const isActive = activeTab === tab.id;
                                return (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex-1 flex flex-col sm:flex-row items-center justify-center py-2 sm:py-3 px-1 rounded-xl text-xs sm:text-sm font-bold transition-all
                                            ${isActive ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}
                                    >
                                        <div className="mb-1 sm:mb-0 sm:mr-2 opacity-80"><Icon /></div>
                                        <span className={isActive ? 'opacity-100' : 'opacity-90'}>{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Zone d'affichage dynamique */}
                        <div className="min-h-[400px]">
                            {activeTab === 'cours' && (
                                <div className="animate-fadeIn max-w-3xl mx-auto">
                                    <div className="mb-6">
                                        <h2 className="text-2xl font-bold text-slate-800 flex items-center mb-2">
                                            <span className="mr-2">{activeModule.icon}</span> L'essentiel à retenir
                                        </h2>
                                        <p className="text-slate-500">Conforme au manuel officiel et enrichi avec les astuces de classe.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        {activeModule.course}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'labo' && (
                                <div className="animate-fadeIn">
                                    <div className="mb-6 text-center max-w-2xl mx-auto">
                                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Manipulation Visuelle</h2>
                                        <p className="text-slate-600">Jouez avec les variables pour observer les résultats de façon interactive.</p>
                                    </div>
                                    {activeModule.labType === 'triangle-alkashi' ? (
                                        <TriangleLab />
                                    ) : (
                                        <TrigonometryLab type={activeModule.labType} />
                                    )}
                                </div>
                            )}

                            {activeTab === 'qcm' && (
                                <div className="animate-fadeIn max-w-2xl mx-auto">
                                    <div className="mb-6">
                                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Vérification des acquis</h2>
                                        <p className="text-slate-600">Appliquez les astuces vues en cours. Une explication s'affichera à chaque réponse.</p>
                                    </div>
                                    <Quiz questions={activeModule.quiz} />
                                </div>
                            )}

                            {activeTab === 'exercices' && (
                                <div className="animate-fadeIn max-w-3xl mx-auto">
                                    <div className="mb-6">
                                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Entraînement pas à pas</h2>
                                        <p className="text-slate-600">Exercices typiques basés sur le manuel. Essayez de les faire sur un brouillon avant de regarder la correction.</p>
                                    </div>
                                    <ExerciseViewer exercises={activeModule.exercises} />
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
